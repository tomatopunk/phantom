name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GO_VERSION: '1.25.0'

jobs:
  lint:
    name: Lint (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install protoc (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install protoc (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf
      - name: Generate proto (lib/proto)
        run: make proto
      - name: License headers (Apache-2.0)
        run: make license-check
      - uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.3

  rust-lint:
    name: Rust fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt -p phantom-cli -p phantom-client -- --check
      - run: cargo clippy -p phantom-cli -p phantom-client --all-targets -- -D warnings

  rust-coverage:
    name: Rust test (llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - run: cargo llvm-cov test -p phantom-cli -p phantom-client --codecov --output-path rust-codecov.json
      - uses: actions/upload-artifact@v4
        with:
          name: rust-codecov
          path: rust-codecov.json
      # Do not use secrets.* in step if: — breaks workflow schema validation in some environments.
      - name: Upload Rust coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: rust-codecov.json
          flags: rust
          name: rust-codecov
          fail_ci_if_error: false

  test-and-build:
    name: Test and Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # Hook TestCompile_COReHook runs before the later "Build eBPF" step; needs same headers as CO-RE clang (Makefile).
      - name: Install protoc and BPF compile deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libbpf-dev linux-libc-dev clang linux-headers-$(uname -r)
      - name: Install protoc (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf
      - name: Generate proto (lib/proto)
        run: make proto
      - run: go build ./...
      - run: go vet ./...
      - name: Go test (with coverage on Linux)
        if: matrix.os == 'ubuntu-latest'
        run: go test -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload Go coverage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
      - name: Upload Go coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          flags: go
          name: go-coverage
          fail_ci_if_error: false
      - name: Go test (macOS)
        if: matrix.os == 'macos-latest'
        run: go test ./...
      - run: make build
      - uses: dtolnay/rust-toolchain@stable
        if: matrix.os == 'ubuntu-latest'
      - name: Rust (phantom-cli)
        if: matrix.os == 'ubuntu-latest'
        run: cargo build -p phantom-cli
      - uses: actions/setup-node@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          node-version: "20"
      - name: Phantom desktop (Vite + TypeScript)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd src/desktop
          npm install
          npm run build
      # Tauri 2 on Linux pulls gtk/glib/webkit via build.rs; pkg-config needs .pc from -dev packages.
      - name: Install Tauri Linux native deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libglib2.0-dev libssl-dev
      - name: Rust (phantom-desktop lib)
        if: matrix.os == 'ubuntu-latest'
        run: cargo build -p phantom-desktop
      - name: Build eBPF (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libbpf-dev linux-headers-$(uname -r)
          ls -la /usr/include/bpf/
          make build-bpf
      - name: Verify eBPF artifacts
        if: matrix.os == 'ubuntu-latest'
        run: |
          test -f src/agent/bpf/probes/kernel/minikprobe.o
          test -f src/agent/bpf/probes/user/uprobe.o
          test -f src/agent/bpf/core/events.o

  e2e-bpf:
    name: E2E (Linux + BPF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler clang libbpf-dev linux-headers-$(uname -r) curl build-essential libcap2-bin
      - name: Generate proto, BPF, agent; full MR e2e
        run: |
          ulimit -l unlimited || true
          make proto
          make build-bpf
          make agent
          # Go e2e starts phantom-agent without sudo; file caps must be set before go test (shell scripts also setcap).
          sudo setcap cap_sys_resource,cap_bpf+ep ./phantom-agent || true
          make test-e2e-mr
