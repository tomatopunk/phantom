syntax = "proto3";

package phantom.api;

option go_package = "github.com/tomatopunk/phantom/pkg/api/proto;proto";

// DebuggerService is the main gRPC API for the remote eBPF debugger agent.
service DebuggerService {
  rpc Connect(ConnectRequest) returns (ConnectResponse);
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);
  rpc StreamEvents(StreamEventsRequest) returns (stream DebugEvent);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc CloseSession(CloseSessionRequest) returns (CloseSessionResponse);
}

message ConnectRequest {
  string session_id = 1;
}

message ConnectResponse {
  string session_id = 1;
  string message = 2;
}

message ExecuteRequest {
  string session_id = 1;
  string command_line = 2;  // e.g. "break do_sys_open", "print pid"
}

message ExecuteResponse {
  bool ok = 1;
  string output = 2;
  string error_message = 3;
  oneof result {
    BreakpointResult breakpoint = 4;
    PrintResult print = 5;
    TraceResult trace = 6;
    HookResult hook = 7;
  }
}

message BreakpointResult {
  string breakpoint_id = 1;
  string symbol = 2;
  bool enabled = 3;
}

message PrintResult {
  string expression = 1;
  string value = 2;
}

message TraceResult {
  string trace_id = 1;
  repeated string expressions = 2;
}

message HookResult {
  string hook_id = 1;
  string attach_point = 2;
  bool compiled = 3;
  string error_message = 4;
}

message StreamEventsRequest {
  string session_id = 1;
}

message DebugEvent {
  int64 timestamp_ns = 1;
  string session_id = 2;
  EventType event_type = 3;
  uint32 pid = 4;
  uint32 tgid = 5;
  uint32 cpu = 6;
  string probe_id = 7;
  bytes payload = 8;  // event-type-specific data
}

enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  EVENT_TYPE_BREAK_HIT = 1;
  EVENT_TYPE_TRACE_SAMPLE = 2;
  EVENT_TYPE_ERROR = 3;
  EVENT_TYPE_STATE_CHANGE = 4;
}

message ListSessionsRequest {}

message ListSessionsResponse {
  repeated string session_ids = 1;
}

message CloseSessionRequest {
  string session_id = 1;
}

message CloseSessionResponse {
  bool ok = 1;
}
