<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phantom Desktop</title>
    <script>
      (function () {
        try {
          var k = "phantom-appearance";
          var v = localStorage.getItem(k) || "system";
          var dark = v === "dark" ? true : v === "light" ? false : window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-app-bg text-app-label antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
