name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  GO_VERSION: '1.25.0'

jobs:
  preflight:
    name: Preflight (tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Generate proto
        run: make proto
      - run: go test ./...
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p phantom-cli -p phantom-client

  release:
    name: Build agent (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: [preflight]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o phantom-agent-${{ matrix.goos }}-${{ matrix.goarch }} ./src/agent
      - name: Upload agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: phantom-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: phantom-agent-${{ matrix.goos }}-${{ matrix.goarch }}

  rust-cli-release:
    name: Build Rust CLI (Linux amd64)
    needs: [preflight]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build phantom-cli
        run: cargo build -p phantom-cli --release
      - name: Stage binary
        run: |
          cp target/release/phantom-cli phantom-cli-linux-amd64
          chmod +x phantom-cli-linux-amd64
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: phantom-cli-linux-amd64
          path: phantom-cli-linux-amd64

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release, rust-cli-release]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: phantom-*
          merge-multiple: true
          path: release-assets
      - name: Prepare binaries
        run: |
          set -eux
          ls -la release-assets
          chmod +x release-assets/phantom-agent-* release-assets/phantom-cli-* 2>/dev/null || true
          test -f release-assets/phantom-agent-linux-amd64
          test -f release-assets/phantom-cli-linux-amd64
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/phantom-agent-darwin-amd64
            release-assets/phantom-agent-darwin-arm64
            release-assets/phantom-agent-linux-amd64
            release-assets/phantom-agent-linux-arm64
            release-assets/phantom-cli-linux-amd64
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
