name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GO_VERSION: '1.25.0'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.3

  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - run: make build
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang libbpf-dev linux-headers-$(uname -r)
      - name: Check libbpf headers
        run: ls -la /usr/include/bpf/
      - run: make build-bpf
